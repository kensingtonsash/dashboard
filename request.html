<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Request a Quote — Kensington Sash</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:system-ui,-apple-system,sans-serif;
  color:#1a1a1a;
  font-size:14px;
  min-height:100vh;
  background-color:#2e3e38;
  background-image:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:40px 40px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:2.5rem 1rem 3rem;
}

.card{
  background:#fff;
  border-radius:16px;
  width:100%;
  max-width:520px;
  box-shadow:0 8px 40px rgba(0,0,0,0.25),0 1px 0 rgba(255,255,255,0.05);
  overflow:hidden;
}

/* Header strip */
.card-head{
  background:#34453E;
  padding:1.5rem 1.75rem 1.25rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
}
.card-head img{height:32px;width:auto;filter:brightness(0) invert(1)}
.card-head-text{font-size:12px;color:rgba(255,255,255,0.5);text-align:right;line-height:1.5}
.card-head-text a{color:rgba(255,255,255,0.7);text-decoration:none}
.card-head-text a:hover{color:#fff}

/* Body */
.card-body{padding:1.5rem 1.75rem 1.75rem}

.eyebrow{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#34453E;margin-bottom:4px}
h1{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-bottom:1.25rem;color:#111}

/* Dividers */
.divider{
  font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
  color:#bbb;margin:1.25rem 0 .9rem;display:flex;align-items:center;gap:7px
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#f0f0ee}

/* Grid layouts */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.g3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:9px;margin-bottom:9px}
.g1{margin-bottom:9px}

label{display:block;font-size:11.5px;font-weight:500;color:#777;margin-bottom:3px}
input,textarea{
  width:100%;border:1px solid #e8e8e8;border-radius:7px;
  padding:8px 10px;font-size:13.5px;font-family:inherit;
  outline:none;color:#1a1a1a;background:#fafafa;
  transition:border-color .15s,background .15s;
}
input:focus,textarea:focus{border-color:#34453E;background:#fff;box-shadow:0 0 0 3px rgba(52,69,62,.07)}
input::placeholder,textarea::placeholder{color:#ccc}
textarea{resize:vertical;min-height:68px;line-height:1.5}
.req{color:#A32D2D}

/* Services */
.services{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.svc{position:relative}
.svc input{position:absolute;opacity:0;width:0;height:0}
.svc label{
  display:block;padding:8px 10px;border:1px solid #ebebeb;border-radius:7px;
  cursor:pointer;font-size:12.5px;color:#666;background:#fafafa;
  transition:all .12s;line-height:1.3;margin:0;
}
.svc label:hover{border-color:#34453E;background:#f0f4f2;color:#34453E}
.svc input:checked+label{border-color:#34453E;background:#f0f4f2;color:#34453E;font-weight:500}
.svc-full{grid-column:1/-1}

/* Count + photo row */
.detail-row{display:grid;grid-template-columns:110px 1fr;gap:9px;margin-bottom:9px;align-items:end}
.photo-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:8px 10px;border:1px dashed #ddd;border-radius:7px;
  font-size:12.5px;color:#999;cursor:pointer;background:#fafafa;
  transition:border-color .15s,color .15s;font-family:inherit;
}
.photo-btn:hover{border-color:#34453E;color:#34453E}
.photo-btn input{display:none}
.photo-preview{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.photo-preview img{width:48px;height:48px;object-fit:cover;border-radius:5px;border:1px solid #eee}

/* Toggles */
.tog-pair{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.tog-card{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 11px;border:1px solid #ebebeb;border-radius:7px;background:#fafafa;
}
.tog-card-text{font-size:12px;color:#666;line-height:1.3}
.tog{position:relative;display:inline-block;width:34px;height:19px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tog-s{position:absolute;cursor:pointer;inset:0;background:#ddd;border-radius:19px;transition:.18s}
.tog-s:before{content:'';position:absolute;height:13px;width:13px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.15)}
.tog input:checked+.tog-s{background:#34453E}
.tog input:checked+.tog-s:before{transform:translateX(15px)}

/* Submit */
.submit-btn{
  width:100%;background:#34453E;color:#fff;border:none;border-radius:8px;
  padding:11px;font-size:14px;font-weight:500;font-family:inherit;
  cursor:pointer;transition:background .15s;margin-top:1rem;letter-spacing:.01em;
}
.submit-btn:hover{background:#2a3830}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.foot-note{font-size:11.5px;color:#bbb;text-align:center;margin-top:8px}

/* Success */
#success-msg{display:none;text-align:center;padding:2.5rem 1.5rem}
#success-msg .s-icon{font-size:38px;margin-bottom:.75rem}
#success-msg h2{font-size:18px;font-weight:600;color:#34453E;margin-bottom:6px}
#success-msg p{font-size:13px;color:#777;line-height:1.6}

@media(max-width:440px){
  body{padding:0;align-items:flex-start}
  .card{border-radius:0;box-shadow:none;min-height:100vh}
  .g2,.g3,.services,.tog-pair,.detail-row{grid-template-columns:1fr}
  .svc-full{grid-column:1}
}
</style>
</head>
<body>
<div class="card">

  <div class="card-head">
    <img src="/Logo%20slogan%202.png" alt="Kensington Sash">
    <div class="card-head-text">
      020 3840 7255<br>
      <a href="mailto:info@kensingtonsash.co.uk">info@kensingtonsash.co.uk</a>
    </div>
  </div>

  <div class="card-body">
    <div class="eyebrow">Kensington Sash</div>
    <h1>Request a Quote</h1>

    <form id="req-form">

      <div class="g2">
        <div><label>First name <span class="req">*</span></label><input type="text" name="first_name" required placeholder="First name"></div>
        <div><label>Last name <span class="req">*</span></label><input type="text" name="last_name" required placeholder="Last name"></div>
      </div>
      <div class="g2">
        <div><label>Email <span class="req">*</span></label><input type="email" name="email" required placeholder="you@email.com"></div>
        <div><label>Phone <span class="req">*</span></label><input type="tel" name="phone" required placeholder="+44"></div>
      </div>
      <div class="g1"><label>Company <span style="color:#bbb;font-weight:400">(optional)</span></label><input type="text" name="company" placeholder="Company name"></div>

      <div class="divider">Property</div>

      <div class="g1"><label>Street address <span class="req">*</span></label><input type="text" name="street" required placeholder="Street address"></div>
      <div class="g3">
        <div><label>City <span class="req">*</span></label><input type="text" name="city" required placeholder="London"></div>
        <div><label>County</label><input type="text" name="county" placeholder="County"></div>
        <div><label>Postcode <span class="req">*</span></label><input type="text" name="postcode" required placeholder="SW1A 1AA"></div>
      </div>
      <div class="g1"><label>Flat / unit <span style="color:#bbb;font-weight:400">(optional)</span></label><input type="text" name="unit" placeholder="Flat, apt, suite…"></div>

      <div class="divider">Services needed</div>

      <div class="services">
        <div class="svc"><input type="checkbox" name="service" value="New Windows and Doors" id="s1"><label for="s1">New Windows & Doors</label></div>
        <div class="svc"><input type="checkbox" name="service" value="Sash-Only Replacement" id="s2"><label for="s2">New Sashes into Existing Frames</label></div>
        <div class="svc"><input type="checkbox" name="service" value="Sash Window Repairs" id="s3"><label for="s3">Sash Window Repairs</label></div>
        <div class="svc"><input type="checkbox" name="service" value="Sash Window Painting" id="s4"><label for="s4">Sash Window Painting</label></div>
        <div class="svc"><input type="checkbox" name="service" value="Vacuum Glazing" id="s5"><label for="s5">Vacuum Glazing</label></div>
        <div class="svc svc-full"><input type="checkbox" name="service" value="General Enquiry" id="s7"><label for="s7">General Enquiry — not sure yet</label></div>
      </div>

      <div class="divider">Details</div>

      <div class="detail-row">
        <div><label>No. of windows</label><input type="number" name="window_count" min="1" placeholder="e.g. 4"></div>
        <div>
          <label>Photos <span style="color:#bbb;font-weight:400">(up to 10)</span></label>
          <label class="photo-btn">
            📷 &nbsp;Add photos
            <input type="file" id="photo-input" name="photos" accept="image/*" multiple>
          </label>
        </div>
      </div>
      <div class="photo-preview" id="photo-preview"></div>
      <div class="g1"><label>Description <span style="color:#bbb;font-weight:400">(optional but helpful)</span></label><textarea name="notes" placeholder="Condition, sizes, access requirements, listed building…"></textarea></div>

      <div class="divider">Preferences</div>

      <div class="tog-pair">
        <div class="tog-card">
          <div class="tog-card-text">Free onsite survey</div>
          <label class="tog"><input type="checkbox" name="survey" checked><span class="tog-s"></span></label>
        </div>
        <div class="tog-card">
          <div class="tog-card-text">Photo estimate instead</div>
          <label class="tog"><input type="checkbox" name="photo_estimate"><span class="tog-s"></span></label>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Send Request</button>
      <div class="foot-note">No obligation &nbsp;·&nbsp; We respond within 24 hours</div>

    </form>

    <div id="success-msg">
      <div class="s-icon">✅</div>
      <h2>Request received</h2>
      <p>We'll be in touch shortly.<br>Urgent? Call <strong>020 3840 7255</strong></p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://wuzcvgucszxoefcscqkd.supabase.co/rest/v1';
const SUPABASE_BASE='https://wuzcvgucszxoefcscqkd.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1emN2Z3Vjc3p4b2VmY3NjcWtkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODU3NjAsImV4cCI6MjA5ODA2MTc2MH0.rnibj12j6stQHFbS3lkKhNSvKYmCi_sM5s-vLLmTg88';

document.getElementById('photo-input').addEventListener('change',function(){
  const p=document.getElementById('photo-preview');p.innerHTML='';
  [...this.files].slice(0,10).forEach(f=>{
    const img=document.createElement('img');img.src=URL.createObjectURL(f);p.appendChild(img);
  });
});

document.getElementById('req-form').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Sending…';
  const fd=new FormData(this);
  const services=[...document.querySelectorAll('input[name=service]:checked')].map(i=>i.value);
  const client=`${fd.get('first_name')||''} ${fd.get('last_name')||''}`.trim();
  const unit=fd.get('unit')?`, ${fd.get('unit')}`:'';
  const address=`${fd.get('street')||''}${unit}, ${fd.get('city')||''} ${fd.get('postcode')||''}`.trim();
  const jobType=services.length?services.join(', '):'General Enquiry';
  const id='req_'+Date.now();

  const photoFiles=[...document.getElementById('photo-input').files].slice(0,10);
  const photoUrls=[];
  for(const file of photoFiles){
    try{
      const ext=file.name.split('.').pop();
      const path=`${id}/${Date.now()}.${ext}`;
      const r=await fetch(`${SUPABASE_BASE}/storage/v1/object/request-photos/${path}`,{
        method:'POST',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':file.type},body:file
      });
      if(r.ok)photoUrls.push(`${SUPABASE_BASE}/storage/v1/object/public/request-photos/${path}`);
    }catch(err){console.warn('Photo upload failed',err);}
  }

  const record={
    id,quote_no:'TBC',client,address,job_type:jobType,value:0,status:'New',
    date:new Date().toISOString().split('T')[0],drive_url:'',
    notes:fd.get('notes')||'',email:fd.get('email')||'',phone:fd.get('phone')||'',
    company:fd.get('company')||'',window_count:fd.get('window_count')||'',
    survey:document.querySelector('input[name=survey]').checked,
    photo_estimate:document.querySelector('input[name=photo_estimate]').checked,
    photo_urls:photoUrls.length?photoUrls:null,
  };

  try{
    const res=await fetch(`${SUPABASE_URL}/enquiries`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},
      body:JSON.stringify(record)
    });
    if(!res.ok)throw new Error(await res.text());

    const today=new Date();
    const dd=String(today.getDate()).padStart(2,'0');
    const mm=String(today.getMonth()+1).padStart(2,'0');
    const yyyy=today.getFullYear();
    const clientRecord={name:client,company:fd.get('company')||'',email:fd.get('email')||'',phone:fd.get('phone')||'',address,last_activity:`${dd}/${mm}/${yyyy}`};
    const existing=await fetch(`${SUPABASE_URL}/clients?email=eq.${encodeURIComponent(clientRecord.email)}&limit=1`,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const existingData=await existing.json();
    if(!existingData.length){
      await fetch(`${SUPABASE_URL}/clients`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'return=minimal'},
        body:JSON.stringify(clientRecord)
      });
    }

    document.getElementById('req-form').style.display='none';
    document.getElementById('success-msg').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(err){
    btn.disabled=false;btn.textContent='Send Request';
    alert('Something went wrong — please try again or email info@kensingtonsash.co.uk');
    console.error(err);
  }
});
</script>
</body>
</html>
